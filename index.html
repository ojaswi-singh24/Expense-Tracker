<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Expense Tracker</h1>

        <h2>Your Balance</h2>
        <h3 id="balance">₹0.00</h3>

        <div class="summary">

            <div>
                <h4>Income</h4>
                <p id="money-plus">₹0</p>
            </div>

            <div>
                <h4>Expense</h4>
                <p id="money-minus">₹0</p>
            </div>

        </div>

        <h3>Add Transaction</h3>

        <form id="form">

            <input
                type="text"
                id="text"
                placeholder="Enter description"
                required>

            <input
                type="number"
                id="amount"
                placeholder="Enter amount (+income, -expense)"
                required>

            <button>Add Transaction</button>

        </form>

        <h3>History</h3>

        <ul id="list"></ul>

    </div>

<script src="script.js"></script>

</body>
</html>
